<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — PowerPluto Technologies</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
    .card { background: #1a1a2e; border: 1px solid #2d2d4e; }
    .badge-new { background:#7c3aed22; color:#a78bfa; border:1px solid #7c3aed55; }
    .badge-in_review { background:#065f4622; color:#34d399; border:1px solid #065f4655; }
    .badge-contacted { background:#92400e22; color:#fbbf24; border:1px solid #92400e55; }
    .badge-closed { background:#1e293b; color:#64748b; border:1px solid #33415555; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Login Screen -->
  <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
    <div class="card rounded-2xl p-8 w-full max-w-sm">
      <h1 class="text-2xl font-bold text-violet-400 mb-1">PowerPluto</h1>
      <p class="text-slate-400 text-sm mb-6">Admin Dashboard</p>
      <input id="loginEmail" type="email" placeholder="Email" class="w-full bg-[#0f0f1a] border border-slate-700 rounded-lg px-4 py-2 mb-3 text-sm focus:outline-none focus:border-violet-500"/>
      <input id="loginPassword" type="password" placeholder="Password" class="w-full bg-[#0f0f1a] border border-slate-700 rounded-lg px-4 py-2 mb-4 text-sm focus:outline-none focus:border-violet-500"/>
      <button onclick="login()" class="w-full bg-violet-600 hover:bg-violet-700 text-white rounded-lg py-2 text-sm font-semibold transition">Login</button>
      <p id="loginError" class="text-red-400 text-xs mt-3 hidden"></p>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden">
    <!-- Navbar -->
    <nav class="border-b border-slate-800 px-6 py-4 flex items-center justify-between">
      <span class="text-violet-400 font-bold text-lg">PowerPluto Admin</span>
      <div class="flex gap-3">
        <button onclick="showTab('inquiries')" id="tab-inquiries" class="text-sm px-4 py-1.5 rounded-lg bg-violet-600 text-white">Inquiries</button>
        <button onclick="showTab('portfolio')" id="tab-portfolio" class="text-sm px-4 py-1.5 rounded-lg text-slate-400 hover:text-white">Portfolio</button>
        <button onclick="logout()" class="text-sm text-slate-500 hover:text-red-400 ml-4">Logout</button>
      </div>
    </nav>

    <!-- Stats Bar -->
    <div id="statsBar" class="grid grid-cols-2 md:grid-cols-5 gap-4 p-6"></div>

    <!-- Inquiries Tab -->
    <div id="inquiriesTab" class="px-6 pb-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold">Inquiries</h2>
        <select id="statusFilter" onchange="loadInquiries()" class="bg-[#1a1a2e] border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-slate-300">
          <option value="">All</option>
          <option value="new">New</option>
          <option value="in_review">In Review</option>
          <option value="contacted">Contacted</option>
          <option value="closed">Closed</option>
        </select>
      </div>
      <div id="inquiriesList" class="space-y-3"></div>
    </div>

    <!-- Portfolio Tab -->
    <div id="portfolioTab" class="px-6 pb-6 hidden">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold">Portfolio Projects</h2>
        <button onclick="showProjectForm()" class="bg-violet-600 hover:bg-violet-700 text-white text-sm px-4 py-1.5 rounded-lg">+ Add Project</button>
      </div>
      <div id="projectsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </div>

    <!-- Inquiry Detail Modal -->
    <div id="inquiryModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
      <div class="card rounded-2xl p-6 w-full max-w-lg max-h-[80vh] overflow-y-auto">
        <div class="flex justify-between items-start mb-4">
          <h3 class="font-semibold text-lg">Inquiry Details</h3>
          <button onclick="closeModal('inquiryModal')" class="text-slate-500 hover:text-white text-xl">×</button>
        </div>
        <div id="inquiryDetail"></div>
        <div class="mt-4 flex gap-2 flex-wrap">
          <button onclick="updateStatus('new')" class="text-xs px-3 py-1.5 rounded-lg badge-new">Mark New</button>
          <button onclick="updateStatus('in_review')" class="text-xs px-3 py-1.5 rounded-lg badge-in_review">In Review</button>
          <button onclick="updateStatus('contacted')" class="text-xs px-3 py-1.5 rounded-lg badge-contacted">Contacted</button>
          <button onclick="updateStatus('closed')" class="text-xs px-3 py-1.5 rounded-lg badge-closed">Closed</button>
        </div>
        <textarea id="notesField" placeholder="Add notes..." class="w-full mt-3 bg-[#0f0f1a] border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-violet-500" rows="3"></textarea>
        <button onclick="saveNotes()" class="mt-2 bg-violet-600 hover:bg-violet-700 text-white text-sm px-4 py-1.5 rounded-lg">Save Notes</button>
      </div>
    </div>

    <!-- Project Form Modal -->
    <div id="projectModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
      <div class="card rounded-2xl p-6 w-full max-w-lg max-h-[80vh] overflow-y-auto">
        <div class="flex justify-between items-start mb-4">
          <h3 class="font-semibold text-lg" id="projectModalTitle">Add Project</h3>
          <button onclick="closeModal('projectModal')" class="text-slate-500 hover:text-white text-xl">×</button>
        </div>
        <input id="proj_title" placeholder="Project Title *" class="w-full bg-[#0f0f1a] border border-slate-700 rounded-lg px-3 py-2 text-sm mb-3 focus:outline-none focus:border-violet-500"/>
        <select id="proj_category" class="w-full bg-[#0f0f1a] border border-slate-700 rounded-lg px-3 py-2 text-sm mb-3 focus:outline-none focus:border-violet-500">
          <option value="">Select Category *</option>
          <option>Website</option><option>Mobile App</option><option>Web App</option><option>POS</option>
        </select>
        <input id="proj_client" placeholder="Client Name" class="w-full bg-[#0f0f1a] border border-slate-700 rounded-lg px-3 py-2 text-sm mb-3 focus:outline-none focus:border-violet-500"/>
        <textarea id="proj_description" placeholder="Description *" rows="3" class="w-full bg-[#0f0f1a] border border-slate-700 rounded-lg px-3 py-2 text-sm mb-3 focus:outline-none focus:border-violet-500"></textarea>
        <input id="proj_techStack" placeholder="Tech Stack (comma separated)" class="w-full bg-[#0f0f1a] border border-slate-700 rounded-lg px-3 py-2 text-sm mb-3 focus:outline-none focus:border-violet-500"/>
        <input id="proj_thumbnailUrl" placeholder="Thumbnail URL" class="w-full bg-[#0f0f1a] border border-slate-700 rounded-lg px-3 py-2 text-sm mb-3 focus:outline-none focus:border-violet-500"/>
        <input id="proj_liveUrl" placeholder="Live URL" class="w-full bg-[#0f0f1a] border border-slate-700 rounded-lg px-3 py-2 text-sm mb-4 focus:outline-none focus:border-violet-500"/>
        <button onclick="saveProject()" class="w-full bg-violet-600 hover:bg-violet-700 text-white text-sm py-2 rounded-lg font-semibold">Save Project</button>
        <p id="projectError" class="text-red-400 text-xs mt-2 hidden"></p>
      </div>
    </div>
  </div>

  <script>
    const API = '';  // Same origin — backend serves this file
    let token = localStorage.getItem('pp_token');
    let currentInquiryId = null;
    let editProjectId = null;

    if (token) showDashboard();

    async function apiFetch(path, options = {}) {
      const res = await fetch(API + path, {
        ...options,
        headers: { 'Content-Type': 'application/json', ...(token && { Authorization: `Bearer ${token}` }), ...options.headers }
      });
      return res.json();
    }

    async function login() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const data = await apiFetch('/api/admin/login', { method: 'POST', body: JSON.stringify({ email, password }) });
      if (data.success) {
        token = data.token;
        localStorage.setItem('pp_token', token);
        showDashboard();
      } else {
        const err = document.getElementById('loginError');
        err.textContent = data.message;
        err.classList.remove('hidden');
      }
    }

    function logout() {
      localStorage.removeItem('pp_token');
      token = null;
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('loginScreen').classList.remove('hidden');
    }

    async function showDashboard() {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      await loadStats();
      await loadInquiries();
    }

    async function loadStats() {
      const data = await apiFetch('/api/admin/stats');
      if (!data.success) return;
      const s = data.data;
      const bar = document.getElementById('statsBar');
      bar.innerHTML = [
        { label: 'Total', val: s.total, color: 'text-violet-400' },
        { label: 'New', val: s.new, color: 'text-blue-400' },
        { label: 'In Review', val: s.in_review, color: 'text-green-400' },
        { label: 'Contacted', val: s.contacted, color: 'text-yellow-400' },
        { label: 'Closed', val: s.closed, color: 'text-slate-400' }
      ].map(i => `<div class="card rounded-xl p-4 text-center"><p class="text-xs text-slate-500 mb-1">${i.label}</p><p class="text-2xl font-bold ${i.color}">${i.val}</p></div>`).join('');
    }

    async function loadInquiries() {
      const status = document.getElementById('statusFilter').value;
      const data = await apiFetch(`/api/admin/inquiries${status ? '?status=' + status : ''}`);
      if (!data.success) return;
      const list = document.getElementById('inquiriesList');
      if (!data.data.length) { list.innerHTML = '<p class="text-slate-500 text-sm">No inquiries found.</p>'; return; }
      list.innerHTML = data.data.map(i => `
        <div class="card rounded-xl p-4 flex items-start justify-between gap-4 cursor-pointer hover:border-violet-600 transition" onclick="openInquiry('${i._id}')">
          <div class="flex-1 min-w-0">
            <p class="font-semibold truncate">${i.name}</p>
            <p class="text-sm text-slate-400 truncate">${i.email} · ${i.service}</p>
            <p class="text-xs text-slate-500 mt-1">${new Date(i.createdAt).toLocaleDateString()}</p>
          </div>
          <span class="text-xs px-2 py-1 rounded-full badge-${i.status} whitespace-nowrap">${i.status.replace('_',' ')}</span>
        </div>`).join('');
    }

    async function openInquiry(id) {
      currentInquiryId = id;
      const data = await apiFetch(`/api/admin/inquiries/${id}`);
      if (!data.success) return;
      const i = data.data;
      document.getElementById('notesField').value = i.notes || '';
      document.getElementById('inquiryDetail').innerHTML = `
        <div class="space-y-2 text-sm">
          <div class="flex gap-2"><span class="text-slate-400 w-24">Name</span><span class="font-medium">${i.name}</span></div>
          <div class="flex gap-2"><span class="text-slate-400 w-24">Email</span><a href="mailto:${i.email}" class="text-violet-400">${i.email}</a></div>
          <div class="flex gap-2"><span class="text-slate-400 w-24">Phone</span><span>${i.phone || 'N/A'}</span></div>
          <div class="flex gap-2"><span class="text-slate-400 w-24">Service</span><span>${i.service}</span></div>
          <div class="flex gap-2"><span class="text-slate-400 w-24">Budget</span><span>${i.budget || 'N/A'}</span></div>
          <div class="flex gap-2"><span class="text-slate-400 w-24">Date</span><span>${new Date(i.createdAt).toLocaleString()}</span></div>
          <div class="mt-3 p-3 bg-[#0f0f1a] rounded-lg text-slate-300">${i.message}</div>
        </div>`;
      document.getElementById('inquiryModal').classList.remove('hidden');
    }

    async function updateStatus(status) {
      if (!currentInquiryId) return;
      await apiFetch(`/api/admin/inquiries/${currentInquiryId}`, { method: 'PATCH', body: JSON.stringify({ status }) });
      closeModal('inquiryModal');
      loadInquiries();
      loadStats();
    }

    async function saveNotes() {
      const notes = document.getElementById('notesField').value;
      await apiFetch(`/api/admin/inquiries/${currentInquiryId}`, { method: 'PATCH', body: JSON.stringify({ notes }) });
      closeModal('inquiryModal');
    }

    function showTab(tab) {
      document.getElementById('inquiriesTab').classList.toggle('hidden', tab !== 'inquiries');
      document.getElementById('portfolioTab').classList.toggle('hidden', tab !== 'portfolio');
      document.getElementById('tab-inquiries').className = `text-sm px-4 py-1.5 rounded-lg ${tab === 'inquiries' ? 'bg-violet-600 text-white' : 'text-slate-400 hover:text-white'}`;
      document.getElementById('tab-portfolio').className = `text-sm px-4 py-1.5 rounded-lg ${tab === 'portfolio' ? 'bg-violet-600 text-white' : 'text-slate-400 hover:text-white'}`;
      if (tab === 'portfolio') loadProjects();
    }

    async function loadProjects() {
      const data = await apiFetch('/api/portfolio');
      if (!data.success) return;
      const list = document.getElementById('projectsList');
      if (!data.data.length) { list.innerHTML = '<p class="text-slate-500 text-sm">No projects yet.</p>'; return; }
      list.innerHTML = data.data.map(p => `
        <div class="card rounded-xl p-4">
          ${p.thumbnailUrl ? `<img src="${p.thumbnailUrl}" class="w-full h-36 object-cover rounded-lg mb-3"/>` : ''}
          <span class="text-xs px-2 py-0.5 bg-violet-900/40 text-violet-400 rounded-full">${p.category}</span>
          <p class="font-semibold mt-2">${p.title}</p>
          <p class="text-xs text-slate-400 mt-1 line-clamp-2">${p.description}</p>
          <div class="flex gap-2 mt-3">
            <button onclick="editProject('${p._id}')" class="text-xs px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded-lg">Edit</button>
            <button onclick="deleteProject('${p._id}')" class="text-xs px-3 py-1 bg-red-900/40 hover:bg-red-800/60 text-red-400 rounded-lg">Delete</button>
          </div>
        </div>`).join('');
    }

    function showProjectForm(project = null) {
      editProjectId = project ? project._id : null;
      document.getElementById('projectModalTitle').textContent = project ? 'Edit Project' : 'Add Project';
      ['title','category','client','description','liveUrl','thumbnailUrl'].forEach(f => {
        document.getElementById('proj_' + f).value = project ? (project[f] || '') : '';
      });
      document.getElementById('proj_techStack').value = project ? (project.techStack || []).join(', ') : '';
      document.getElementById('projectError').classList.add('hidden');
      document.getElementById('projectModal').classList.remove('hidden');
    }

    async function editProject(id) {
      const data = await apiFetch(`/api/portfolio/${id}`);
      if (data.success) showProjectForm(data.data);
    }

    async function saveProject() {
      const body = {
        title: document.getElementById('proj_title').value,
        category: document.getElementById('proj_category').value,
        client: document.getElementById('proj_client').value,
        description: document.getElementById('proj_description').value,
        techStack: document.getElementById('proj_techStack').value.split(',').map(t => t.trim()).filter(Boolean),
        thumbnailUrl: document.getElementById('proj_thumbnailUrl').value,
        liveUrl: document.getElementById('proj_liveUrl').value
      };
      const method = editProjectId ? 'PUT' : 'POST';
      const path = editProjectId ? `/api/portfolio/${editProjectId}` : '/api/portfolio';
      const data = await apiFetch(path, { method, body: JSON.stringify(body) });
      if (data.success) { closeModal('projectModal'); loadProjects(); }
      else {
        const err = document.getElementById('projectError');
        err.textContent = data.message || 'Failed to save project.';
        err.classList.remove('hidden');
      }
    }

    async function deleteProject(id) {
      if (!confirm('Delete this project?')) return;
      await apiFetch(`/api/portfolio/${id}`, { method: 'DELETE' });
      loadProjects();
    }

    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
  </script>
</body>
</html>
